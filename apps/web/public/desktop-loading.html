<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapTap Maker Plus</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111827;
        color: #f9fafb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        gap: 12px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 14px;
      }

      .detail {
        color: #94a3b8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TapTap Maker Plus</h1>
      <p id="status">Starting local workbench...</p>
      <p id="detail" class="detail">Waiting for local development server.</p>
    </main>
    <script>
      const targets = [
        "http://localhost:5173",
        "http://127.0.0.1:5173",
        "http://[::1]:5173"
      ];
      const statusEl = document.getElementById("status");
      const detailEl = document.getElementById("detail");
      let attempt = 0;

      async function waitForWorkbench() {
        attempt += 1;
        for (const target of targets) {
          try {
            const response = await fetch(target, { cache: "no-store", mode: "no-cors" });
            if (response) {
              window.location.replace(target);
              return;
            }
          } catch (_error) {
            // Try the next loopback address.
          }
        }

        statusEl.textContent = "Still waiting for the local workbench...";
        detailEl.textContent = `Retrying Vite on localhost, 127.0.0.1, and ::1. Attempt ${attempt}.`;
        window.setTimeout(waitForWorkbench, Math.min(1000 + attempt * 250, 4000));
      }

      window.setTimeout(waitForWorkbench, 500);
    </script>
  </body>
</html>
