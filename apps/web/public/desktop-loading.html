<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapTap 制造 Plus</title>
    <style>
      :root {
        --brand: #00D9C5;
        --brand-glow: rgba(0, 217, 197, 0.2);
        --accent-purple: rgba(139, 92, 246, 0.15);
        --accent-yellow: rgba(255, 210, 63, 0.1);
        --brand-bg: #E6FBF9;
        
        /* Light Theme - Ultra Premium */
        --bg-color: #FAFAFA;
        --text-primary: #09090B;
        --text-secondary: #71717A;
        --panel-bg: rgba(255, 255, 255, 0.6);
        --panel-border: rgba(0, 0, 0, 0.03);
        --panel-border-glow: rgba(255, 255, 255, 0.8);
        --track-bg: #F4F4F5;
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.03), 0 32px 80px rgba(0, 0, 0, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Dark Theme - Ultra Premium */
          --bg-color: #050505;
          --brand-glow: rgba(0, 217, 197, 0.15);
          --accent-purple: rgba(139, 92, 246, 0.1);
          --accent-yellow: rgba(255, 210, 63, 0.05);
          
          --text-primary: #FAFAFA;
          --text-secondary: #A1A1AA;
          --panel-bg: rgba(15, 15, 17, 0.6);
          --panel-border: rgba(255, 255, 255, 0.04);
          --panel-border-glow: rgba(255, 255, 255, 0.02);
          --track-bg: #18181B;
          --shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 32px 80px rgba(0, 0, 0, 0.8);
          --brand-bg: rgba(0, 217, 197, 0.15);
        }
      }

      * { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* ==========================================
         ULTRA PREMIUM MESH GRADIENT + NOISE
      ========================================== */
      .bg-container {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        opacity: 0;
        animation: fadeInBg 2s ease forwards;
      }

      /* Smooth Mesh Gradient */
      .bg-mesh {
        position: absolute;
        inset: -20%;
        width: 140%;
        height: 140%;
        background-color: var(--bg-color);
        background-image:
          radial-gradient(circle at 20% 20%, var(--brand-glow) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, var(--brand-glow) 0%, transparent 40%),
          radial-gradient(circle at 80% 20%, var(--accent-purple) 0%, transparent 40%),
          radial-gradient(circle at 20% 80%, var(--accent-yellow) 0%, transparent 40%);
        animation: meshSpin 25s ease-in-out infinite alternate;
        z-index: 0;
      }

      /* Premium Film Grain / Noise Overlay */
      .bg-noise {
        position: absolute;
        inset: 0;
        z-index: 1;
        opacity: 0.3;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* ==========================================
         MAIN LAYOUT
      ========================================== */
      .splash-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 900px;
      }

      /* Dramatic Closing Animation */
      .splash-container.blast-off {
        animation: blastOff 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards;
      }

      /* ==========================================
         MASSIVE PREMIUM LOGO (Horizontal Layout)
      ========================================== */
      .brand-header {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 32px;
        margin-bottom: 72px;
        opacity: 0;
        transform: translateY(-40px);
        animation: fadeDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }
      
      .brand-img-icon {
        height: 96px;
        object-fit: contain;
        filter: drop-shadow(0 20px 40px var(--brand-glow));
        animation: floatLogo 6s ease-in-out infinite;
      }

      .brand-img-text {
        height: 80px;
        object-fit: contain;
        opacity: 0.95;
      }

      /* ==========================================
         PREMIUM GLASSMORPHIC PANEL
      ========================================== */
      .loading-panel {
        width: 800px;
        background: var(--panel-bg);
        backdrop-filter: blur(48px);
        -webkit-backdrop-filter: blur(48px);
        border: 1px solid var(--panel-border);
        box-shadow: inset 0 1px 1px var(--panel-border-glow), var(--shadow);
        border-radius: 40px;
        padding: 48px 64px;
        opacity: 0;
        transform: translateY(40px);
        animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status-title {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.3px;
        transition: color 0.3s ease;
      }
      .status-percent {
        font-size: 16px;
        font-weight: 800;
        color: var(--brand);
        background: var(--brand-bg);
        padding: 6px 16px;
        border-radius: 99px;
        font-variant-numeric: tabular-nums;
        transition: all 0.3s ease;
        box-shadow: inset 0 0 0 1px rgba(0, 217, 197, 0.2);
      }

      /* ==========================================
         PROGRESS BAR
      ========================================== */
      .progress-container {
        position: relative;
        width: 100%;
        height: 56px;
        display: flex;
        align-items: center;
      }

      .track {
        position: absolute;
        left: 0; right: 0;
        height: 12px;
        background: var(--track-bg);
        border-radius: 6px;
        z-index: 1;
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }

      .fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 0%;
        background: var(--brand);
        border-radius: 6px;
        z-index: 2;
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      .fill::after {
        content: '';
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        animation: shimmer 2s infinite;
      }

      /* ==========================================
         NODES
      ========================================== */
      .nodes-layer {
        position: absolute;
        left: 0; right: 0;
        height: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 3;
        padding: 0 4px; 
      }

      .node-point {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .marker {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--track-bg);
        border: 4px solid var(--panel-bg);
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        z-index: 2;
      }

      .marker::before {
        content: '';
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 2px solid var(--brand);
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.5s ease;
      }

      .label {
        position: absolute;
        top: 36px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
        white-space: nowrap;
        transition: all 0.3s ease;
      }

      /* Active State */
      .node-point.active .marker {
        background: var(--brand);
        transform: scale(1.4);
        box-shadow: 0 0 20px var(--brand-glow);
      }
      .node-point.active .marker::before {
        opacity: 1;
        transform: scale(1);
        animation: pulseAura 2.5s infinite cubic-bezier(0.16, 1, 0.3, 1);
      }
      .node-point.active .label {
        color: var(--text-primary);
        font-weight: 700;
      }

      /* Completed State */
      .node-point.completed .marker {
        background: var(--brand);
        border-color: var(--brand);
        transform: scale(0.8);
      }
      .node-point.completed .label {
        color: var(--text-secondary);
      }

      /* Animations */
      @keyframes fadeInBg {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @keyframes pulseAura {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.8); opacity: 0; }
      }
      @keyframes meshSpin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(5deg) scale(1.05); }
        100% { transform: rotate(-5deg) scale(1.1); }
      }
      @keyframes floatLogo {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
      }
      @keyframes blastOff {
        0% { transform: scale(1); opacity: 1; }
        30% { transform: scale(0.98); opacity: 1; } /* Subtly pull back */
        100% { transform: scale(1.15); opacity: 0; } /* Zoom and vanish */
      }
    </style>
  </head>
  <body>
    <!-- Ultra Premium Mesh + Noise Background -->
    <div class="bg-container">
      <div class="bg-mesh"></div>
      <div class="bg-noise"></div>
    </div>

    <div class="splash-container" id="splash">
      
      <!-- Massive Official Logos (Left-Right Layout) -->
      <div class="brand-header">
        <img src="favicon.png" alt="Icon" class="brand-img-icon" />
        <img src="logo-text.png" alt="TapTap Maker Plus" class="brand-img-text" />
      </div>

      <!-- Premium Glassmorphic Loading Panel -->
      <div class="loading-panel">
        
        <div class="panel-header">
          <div class="status-title" id="log-title">准备唤醒引擎...</div>
          <div class="status-percent" id="log-percent">0%</div>
        </div>

        <div class="progress-container">
          <!-- The Thick Track -->
          <div class="track">
            <!-- The Shimmering Fill -->
            <div class="fill" id="progress"></div>
          </div>

          <!-- The Designed Nodes Layer -->
          <div class="nodes-layer">
            <div class="node-point" id="node-0">
              <div class="marker"></div>
              <div class="label">界面挂载</div>
            </div>
            <div class="node-point" id="node-1">
              <div class="marker"></div>
              <div class="label">本地服务</div>
            </div>
            <div class="node-point" id="node-2">
              <div class="marker"></div>
              <div class="label">通讯协议</div>
            </div>
            <div class="node-point" id="node-3">
              <div class="marker"></div>
              <div class="label">同步工具</div>
            </div>
            <div class="node-point" id="node-4">
              <div class="marker"></div>
              <div class="label">项目装载</div>
            </div>
          </div>
        </div>

      </div>

    </div>

    <script>
      const nodes = [
        { id: "node-0", progress: 0, title: "正在挂载工作台核心界面组件...", percent: "20%" },
        { id: "node-1", progress: 25, title: "正在唤醒 Fastify 本地开发服务...", percent: "40%" },
        { id: "node-2", progress: 50, title: "正在建立与 MCP 协议的扩展通讯...", percent: "60%" },
        { id: "node-3", progress: 75, title: "正在同步 @taptap/maker 工具链...", percent: "80%" },
        { id: "node-4", progress: 100, title: "正在读取并解析当前工程资产...", percent: "100%" }
      ];

      const logTitleEl = document.getElementById("log-title");
      const logPercentEl = document.getElementById("log-percent");
      const progressEl = document.getElementById("progress");
      const splash = document.getElementById("splash");

      const targets = [
        "http://localhost:5173",
        "http://127.0.0.1:5173"
      ];

      const isPreview = new URLSearchParams(window.location.search).get('preview') === 'true';
      const isDev = window.location.protocol.startsWith('http') && !isPreview;

      function activateNode(index) {
        if (index >= nodes.length) return;
        
        if (index > 0) {
          const prevEl = document.getElementById(nodes[index - 1].id);
          if (prevEl) {
            prevEl.classList.remove("active");
            prevEl.classList.add("completed");
          }
        }

        const nodeData = nodes[index];
        const el = document.getElementById(nodeData.id);
        
        if (el) el.classList.add("active");
        
        progressEl.style.width = nodeData.progress + "%";
        logTitleEl.textContent = nodeData.title;
        logPercentEl.textContent = nodeData.percent;
      }

      async function bootSequence() {
        await new Promise(r => setTimeout(r, 800)); // Give intro animation time to settle

        activateNode(0);
        
        await new Promise(r => setTimeout(r, 450));
        activateNode(1);

        let serverReady = false;
        if (isDev) {
           while (!serverReady) {
             for (const target of targets) {
                 try {
                   const res = await fetch(target, { cache: "no-store", mode: "no-cors" });
                   if (res) {
                     serverReady = true;
                     break;
                   }
                 } catch (e) {}
             }
             if (!serverReady) {
                logTitleEl.textContent = "等待本地端口映射 (5173)...";
                await new Promise(r => setTimeout(r, 500));
             }
           }
        } else {
           await new Promise(r => setTimeout(r, 400));
           serverReady = true;
        }

        await new Promise(r => setTimeout(r, 350));
        activateNode(2);
        
        await new Promise(r => setTimeout(r, 350));
        activateNode(3);
        
        await new Promise(r => setTimeout(r, 400));
        activateNode(4);

        await new Promise(r => setTimeout(r, 500));
        
        const finalEl = document.getElementById(nodes[4].id);
        if (finalEl) {
            finalEl.classList.remove("active");
            finalEl.classList.add("completed");
        }

        logTitleEl.textContent = "所有组件就绪，即将进入工作台。";
        logTitleEl.style.color = "var(--brand)";
        logPercentEl.style.background = "var(--brand)";
        logPercentEl.style.color = "var(--panel-bg)";

        // Closing Transition Phase
        await new Promise(r => setTimeout(r, 800));
        splash.classList.add("blast-off");

        await new Promise(r => setTimeout(r, 800)); // Wait for the 0.8s blastOff CSS animation to complete
        
        if (isPreview) {
          // Instead of sitting empty, loop the preview seamlessly!
          setTimeout(() => {
            window.location.reload();
          }, 400);
        } else if (isDev) {
          window.location.replace("http://localhost:5173");
        } else {
          window.location.replace("index.html");
        }
      }

      window.setTimeout(bootSequence, 200);
    </script>
  </body>
</html>
